<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineForo 2026 - Nube de Palabras</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --red: #C0392B; --dark: #2a3a1e; --cream: #f5f0e0;
      --gold: #F4B942; --teal: #1A9B8A; --purple: #6B5FCF;
      --bdr: rgba(0,0,0,0.1);
      --border-thick: #2a2a1a;
    }

    body { 
      font-family: 'Segoe UI', sans-serif; 
      background: var(--dark); 
      height: 100vh; /* Ocupa exactamente la pantalla */
      overflow: hidden; /* PROHIBIDO ESCROLEAR EN PROYECTOR */
      display: flex;
      flex-direction: column;
    }

    /* =========================================
       TOPBAR CON LOGO ANIMADO
       ========================================= */
    .topbar {
      background: var(--dark);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--gold);
      flex-shrink: 0;
    }
    
    /* Logo 27 Años FIE a la izquierda */
    .logo-container {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logo-text-group {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .logo-text-group strong {
      font-size: 16px; font-weight: 700; color: white;
      letter-spacing: 1.5px;
    }
    .logo-text-group span {
      font-size: 11px; color: rgba(255,255,255,.65); letter-spacing: 1px;
    }
    
    /* Indicador EN VIVO Animado a la derecha */
    .live-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--red); border-radius: 20px;
      padding: 8px 20px; color: white; font-size: 13px;
      font-weight: 800; letter-spacing: 1px;
      box-shadow: 2px 2px 0 var(--border-thick);
      position: relative;
      overflow: hidden;
    }
    
    /* Efecto de latido en toda la pastilla roja */
    .live-pill::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 20px;
      box-shadow: 0 0 15px rgba(192, 57, 43, 0.8);
      animation: pill-pulse 1.5s ease-in-out infinite;
      z-index: 0;
    }
    
    .live-pill span {
      position: relative; z-index: 1; /* Para que el texto quede sobre la animación */
    }

    .live-dot {
      width: 10px; height: 10px; background: #4ADE80; border-radius: 50%;
      position: relative; z-index: 1;
      animation: dot-pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pill-pulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    
    @keyframes dot-pulse {
      0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(74,222,128,.6); }
      50% { transform: scale(1.3); box-shadow: 0 0 0 6px rgba(74,222,128,0); }
    }

    /* =========================================
       LAYOUT PRINCIPAL HORIZONTAL (GRID)
       ========================================= */
    .board-container {
      display: grid;
      grid-template-columns: 380px 1fr; /* Columna izq fija, columna der toma el resto */
      gap: 24px;
      padding: 24px 32px;
      flex-grow: 1;
      min-height: 0; /* Permite que los hijos calculen bien su altura */
    }

    /* =========================================
       PANEL IZQUIERDO (Info, Stats y Feed)
       ========================================= */
    .panel-left {
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100%;
    }

    /* Burbuja de Pregunta (Comic Style) */
    .speech-bubble {
      background: var(--cream);
      border-radius: 18px;
      border: 3px solid var(--border-thick);
      padding: 24px;
      position: relative;
      box-shadow: 5px 5px 0 var(--border-thick);
    }
    .speech-bubble::after {
      content: ''; position: absolute; bottom: -18px; left: 40px;
      border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 18px solid var(--border-thick);
    }
    .speech-bubble::before {
      content: ''; position: absolute; bottom: -13px; left: 42px;
      border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 15px solid var(--cream);
      z-index: 1;
    }
    .q-label {
      font-size: 11px; font-weight: 800; letter-spacing: 2px;
      color: var(--purple); text-transform: uppercase; margin-bottom: 6px;
    }
    .q-title {
      font-size: 28px; font-weight: 900; line-height: 1.1;
      color: #1a1a0e; font-family: 'Georgia', serif; text-transform: uppercase;
    }

    /* Grilla de Estadísticas */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr; /* 2 columnas */
      gap: 16px;
    }
    .stat-box {
      background: var(--cream);
      border: 3px solid var(--border-thick);
      border-radius: 14px;
      padding: 16px 12px;
      text-align: center;
      box-shadow: 4px 4px 0 var(--border-thick);
    }
    .stat-box.full-width {
      grid-column: span 2; /* La ganadora ocupa todo el ancho */
    }
    .stat-num {
      font-size: 38px; font-weight: 900; color: var(--red);
      font-family: 'Georgia', serif; line-height: 1;
      word-break: break-word; /* Evita que palabras súper largas rompan la caja */
    }
    .stat-num.teal { color: var(--teal); }
    .stat-num.purple { color: var(--purple); }
    .stat-label {
      font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase; color: #444; margin-top: 6px;
    }

    /* Feed en Vivo (Sin Scroll) */
    .feed-section {
      background: var(--cream);
      border-radius: 14px;
      border: 3px solid var(--border-thick);
      box-shadow: 4px 4px 0 var(--border-thick);
      display: flex;
      flex-direction: column;
      flex-grow: 1; /* Toma el espacio sobrante */
      overflow: hidden;
    }
    .feed-header {
      background: var(--purple);
      padding: 12px 20px;
      font-size: 12px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: white;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 3px solid var(--border-thick);
    }
    .feed-list {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      flex-grow: 1;
    }
    .feed-empty {
      text-align: center; padding: 2rem; color: #888; 
      font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    }
    .feed-item {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 0; border-bottom: 2px solid rgba(0,0,0,0.05);
      animation: slide-in .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .feed-item:last-child { border-bottom: none; }
    @keyframes slide-in {
      from { transform: translateX(-20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .feed-word { font-size: 18px; font-weight: 900; color: var(--red); font-family: 'Georgia', serif;}
    .feed-time { font-size: 12px; font-weight: 700; color: #888; margin-left: auto; }

    /* =========================================
       PANEL DERECHO (Lienzo Nube de Palabras)
       ========================================= */
    .panel-right {
      background: var(--cream);
      border-radius: 18px;
      border: 4px solid var(--gold);
      box-shadow: 6px 6px 0 var(--border-thick);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .wc-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: rgba(0,0,0,.05);
      border-bottom: 2px solid rgba(244,185,66,.4);
    }
    .wc-title {
      font-size: 14px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: #1a1a0e;
      display: flex; align-items: center; gap: 8px;
    }
    .wc-canvas-wrap {
      flex-grow: 1; /* La nube toma todo el alto disponible */
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    #wordcloud { display: block; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo-container">
      <svg viewBox="0 0 175 60" height="40" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="grad27" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#F4B942"/> <stop offset="100%" stop-color="#C0392B"/> </linearGradient>
          </defs>
          <text x="0" y="48" font-family="Arial Black, Impact, sans-serif" font-size="52" font-weight="900" fill="url(#grad27)" font-style="italic" letter-spacing="-3">27</text>
          <text x="68" y="28" font-family="'Playfair Display', serif" font-size="24" font-style="italic" font-weight="700" fill="#f5f0e0">Años</text>
          <text x="70" y="44" font-family="'Segoe UI', sans-serif" font-size="7.5" font-weight="800" fill="#F4B942" letter-spacing="1">XXVII ANIVERSARIO</text>
      </svg>
      <div class="logo-text-group">
        <strong>    Facultad de Informática y Electrónica * FIE   </strong>
        <span>CINE FORO </span>
      </div>
    </div>
    
    <div class="live-pill">
      <div class="live-dot"></div>
      <span>AUDITORIO EN VIVO</span>
    </div>
  </div>

  <div class="board-container">
    
    <div class="panel-left">
      
      <div class="speech-bubble">
        <div class="q-label">La pregunta</div>
        <div class="q-title">¿Qué te llevas<br>del día de hoy?</div>
      </div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-num" id="statRespuestas">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-box">
          <div class="stat-num teal" id="statUnicas">0</div>
          <div class="stat-label">Únicas</div>
        </div>
        <div class="stat-box full-width">
          <div class="stat-num purple" id="statMasVotada">—</div>
          <div class="stat-label">Palabra ganadora</div>
        </div>
      </div>

      <div class="feed-section">
        <div class="feed-header">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="13 2 13 9 22 9 11 22 11 15 2 15 13 2"></polyline></svg>
          Ingresos Recientes
        </div>
        <div class="feed-list" id="liveLog">
          <div class="feed-empty">Esperando participaciones...</div>
        </div>
      </div>

    </div>

    <div class="panel-right">
      <div class="wc-header">
        <div class="wc-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a0e" stroke-width="2.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          Nube de Palabras
        </div>
      </div>
      <div class="wc-canvas-wrap" id="wcWrap">
        <canvas id="wordcloud"></canvas>
      </div>
    </div>

  </div>

  <script>
    // Paleta de colores vibrantes para la nube (Aesthetic Comic/Juego)
    const COLORS = ['#C0392B','#1A9B8A','#F4B942','#6B5FCF','#2980B9','#D35400','#27AE60'];
    let words = {};
    let feedItems = [];

    // Lógica para estructurar el array que lee la librería WordCloud
    function getWordList() {
      return Object.entries(words)
        .map(([w, c]) => [w, Math.max(16, Math.min(100, c * 12 + 16))]) // Aumenté el tamaño base para proyector
        .sort((a, b) => b[1] - a[1]);
    }

    // Dibujar la nube
    function renderCloud() {
      const canvas = document.getElementById('wordcloud');
      const wrap = document.getElementById('wcWrap');
      
      // Adaptar el tamaño del canvas al panel derecho
      canvas.width = wrap.clientWidth;
      canvas.height = wrap.clientHeight;
      
      const list = getWordList();
      if (!list.length) return;
      
      WordCloud(canvas, {
        list,
        gridSize: Math.round(16 * canvas.width / 1024),
        weightFactor: 1.2,
        fontFamily: 'Georgia, serif',
        color: () => COLORS[Math.floor(Math.random() * COLORS.length)],
        rotateRatio: 0.2, // Pocas palabras verticales para facilitar lectura
        rotationSteps: 2,
        backgroundColor: 'transparent', // INTEGRACIÓN CON EL FONDO CREAM
        drawOutOfBound: false,
        minSize: 14,
        shrinkToFit: true,
        shuffle: true
      });
    }

    // Actualizar los números de la izquierda
    function updateStats() {
      const total = Object.values(words).reduce((a, b) => a + b, 0);
      const unique = Object.keys(words).length;
      
      // Encontrar la palabra con más peso
      const top = Object.entries(words).sort((a, b) => b[1] - a[1])[0];
      
      document.getElementById('statRespuestas').textContent = total;
      document.getElementById('statUnicas').textContent = unique;
      
      const elTop = document.getElementById('statMasVotada');
      elTop.textContent = top ? top[0] : '—';
      
      // Control de tamaño de fuente inteligente para palabras ganadoras larguísimas
      if (top && top[0].length > 12) {
        elTop.style.fontSize = '24px';
      } else if (top && top[0].length > 8) {
        elTop.style.fontSize = '30px';
      } else {
        elTop.style.fontSize = '38px';
      }
    }

    // Actualizar la lista en vivo (Limitado estrictamente a 5)
    function updateFeed() {
      const log = document.getElementById('liveLog');
      if (!feedItems.length) {
        log.innerHTML = '<div class="feed-empty">Esperando participaciones...</div>';
        return;
      }
      log.innerHTML = feedItems.map(f => `
        <div class="feed-item">
          <span class="feed-word">${f.word}</span>
          <span class="feed-time">${f.time}</span>
        </div>`).join('');
    }

    // Funciones "Puente" para que app.js interactúe con el HTML limpiamente
    window.addWordcloudEntry = function(word) {
      const now = new Date();
      const t = now.toLocaleTimeString('es-EC', { hour: '2-digit', minute: '2-digit' }); // Hora sin segundos (más limpio)
      
      const w = word.trim().toUpperCase();
      if (!w) return;
      
      // Solo mantenemos las últimas 5 en el feed visual para evitar scroll
      feedItems.unshift({ word: w, time: t });
      if (feedItems.length > 5) feedItems.pop(); 
      
      updateFeed();
    };

    window.loadWordcloudData = function(wordMap) {
      words = { ...wordMap };
      updateStats();
      renderCloud();
    };

    // Redibujar si cambia el tamaño de la ventana
    window.addEventListener('resize', renderCloud);
    window.addEventListener('load', renderCloud);
  </script>

</body>
</html>
